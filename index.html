<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    word-wrap: break-word;
    overflow-wrap: break-word;
}
input, select, textarea { 
    font-size: 16px !important; 
    -webkit-user-select: text;
    user-select: text;
    max-width: 100%;
}
button {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    word-wrap: break-word;
}

/* Safe area for notched phones */
@supports(padding: max(0px)) {
    body {
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
    }
    .bottom-nav {
        padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
}

/* Fix for long numbers and text overflow */
h1, h2, h3, h4, h5, h6, p, div {
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.text-5xl, .text-4xl, .text-3xl, .text-2xl {
    line-height: 1.2;
    max-width: 100%;
}

/* Ensure containers don't overflow */
.glass-card, .profile-card {
    overflow: hidden;
}

/* Better mobile padding */
@media (max-width: 640px) {
    .min-h-screen {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
    }
}

/* Animated Background */
.bg-animated {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.light-sweep {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255, 215, 0, 0.05) 50%, transparent 70%);
    animation: sweep 20s linear infinite;
}

@keyframes sweep {
    0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
    100% { transform: translateX(100%) translateY(100%) rotate(360deg); }
}

/* City Skyline */
.city-skyline {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 35%;
    display: flex;
    animation: scroll 80s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

.building {
    flex-shrink: 0;
    background: linear-gradient(to top, #0a0a1a, #1a1a3a);
    border: 1px solid rgba(255, 215, 0, 0.2);
    position: relative;
    margin: 0 8px;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
}

.window {
    position: absolute;
    background: rgba(255, 215, 0, 0.7);
    animation: glow 4s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

@keyframes glow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

/* Glass Cards */
.glass-card {
    background: rgba(26, 10, 46, 0.8);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 215, 0, 0.3);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 
                0 0 20px rgba(255, 215, 0, 0.1),
                inset 0 1px 0 rgba(255, 215, 0, 0.2);
    border-radius: 24px;
}

.gold-btn {
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    color: #000;
    font-weight: bold;
    border: none;
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.5);
    transition: all 0.3s ease;
    cursor: pointer;
}

.gold-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255, 215, 0, 0.7);
}

.gold-btn:active {
    transform: scale(0.95);
}

.pulse {
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.fade-in {
    animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.shake {
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-15px); }
    75% { transform: translateX(15px); }
}

/* Profile Cards */
.profile-card {
    background: linear-gradient(135deg, rgba(26, 10, 46, 0.9), rgba(22, 33, 62, 0.9));
    border: 3px solid rgba(255, 215, 0, 0.4);
    transition: all 0.3s ease;
    cursor: pointer;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.profile-card:hover, .profile-card:active {
    transform: translateY(-10px) scale(1.02);
    border-color: #FFD700;
    box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4);
}

/* Mobile optimizations */
@media (max-width: 768px) {
    .profile-card {
        min-height: 150px;
    }
    
    .text-7xl {
        font-size: 3.5rem !important;
    }
    
    .text-5xl {
        font-size: 2rem !important;
        word-break: break-word;
    }
    
    .text-4xl {
        font-size: 1.75rem !important;
        word-break: break-word;
    }
    
    .text-3xl {
        font-size: 1.5rem !important;
        word-break: break-word;
    }
    
    .text-2xl {
        font-size: 1.25rem !important;
        word-break: break-word;
    }
    
    .text-xl {
        font-size: 1.1rem !important;
    }
    
    .glass-card {
        padding: 1rem !important;
        overflow: hidden;
    }
    
    .p-8 {
        padding: 1.5rem !important;
    }
    
    .p-10 {
        padding: 1.5rem !important;
    }
    
    .p-6 {
        padding: 1rem !important;
    }
    
    /* Fix long numbers */
    h2, h3, h4, p {
        word-wrap: break-word;
        overflow-wrap: break-word;
        max-width: 100%;
    }
    
    /* Smaller containers on mobile */
    .max-w-4xl, .max-w-2xl, .max-w-md {
        max-width: 100% !important;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
    }
    
    /* Grid adjustments */
    .grid-cols-2 {
        gap: 0.75rem !important;
    }
    
    .grid-cols-3 {
        gap: 0.5rem !important;
    }
}

/* Bottom Nav */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 10, 26, 0.95);
    backdrop-filter: blur(20px);
    border-top: 2px solid rgba(255, 215, 0, 0.3);
    padding: 8px 12px;
    z-index: 1000;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
}

.nav-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 12px;
    transition: all 0.3s ease;
    background: transparent;
    border: none;
    color: #888;
    min-width: 60px;
    font-size: 0.75rem;
}

.nav-btn.active {
    background: rgba(255, 215, 0, 0.2);
    color: #FFD700;
}

.nav-btn:active {
    transform: scale(0.95);
    background: rgba(255, 215, 0, 0.1);
}

/* Mobile button improvements */
@media (max-width: 768px) {
    .gold-btn, button {
        min-height: 48px;
        font-size: 1rem;
    }
    
    input, select {
        min-height: 48px;
    }
    
    .bottom-nav {
        padding: 6px 8px;
    }
    
    .nav-btn {
        padding: 6px 2px;
        font-size: 0.65rem;
    }
}
</style>
</head>
<body>
<div class="bg-animated">
    <div class="light-sweep"></div>
    <div class="city-skyline" id="skyline"></div>
</div>

<div id="app" class="relative z-10"></div>

<script>
const PLAYERS = ['CAY', 'BROOK', 'YONNY', 'DRLEEROY'];
const STARTING_BALANCE = 200000000.00;
const BANK_PLAYER = 'BANK';

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyD1_dvtJW0zmyeaVvCZwEOoe5xGuSUoVFw",
  authDomain: "catdolls-5830c.firebaseapp.com",
  databaseURL: "https://catdolls-5830c-default-rtdb.firebaseio.com",
  projectId: "catdolls-5830c",
  storageBucket: "catdolls-5830c.firebasestorage.app",
  messagingSenderId: "77937726841",
  appId: "1:77937726841:web:c8b1ba1b1b6377b80b4ba8"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const dataRef = database.ref('syndicate');

const FAMOUS_STOCKS = [
    { symbol: 'AAPL', name: 'Apple Inc.' },
    { symbol: 'MSFT', name: 'Microsoft' },
    { symbol: 'GOOGL', name: 'Alphabet' },
    { symbol: 'AMZN', name: 'Amazon' },
    { symbol: 'TSLA', name: 'Tesla' },
    { symbol: 'NVDA', name: 'NVIDIA' },
    { symbol: 'META', name: 'Meta' },
    { symbol: 'JPM', name: 'JPMorgan' },
    { symbol: 'V', name: 'Visa' },
    { symbol: 'WMT', name: 'Walmart' },
    { symbol: 'DIS', name: 'Disney' },
    { symbol: 'NFLX', name: 'Netflix' }
];

const PROPERTIES = [
    { id: 'prop1', name: 'Downtown Penthouse', price: 5000000, income: 2500000 },
    { id: 'prop2', name: 'Beachfront Villa', price: 8000000, income: 4000000 },
    { id: 'prop3', name: 'Shopping Mall', price: 15000000, income: 10000000 },
    { id: 'prop4', name: 'Office Tower', price: 25000000, income: 18000000 },
    { id: 'prop5', name: 'Luxury Hotel', price: 50000000, income: 40000000 },
    { id: 'prop6', name: 'Casino Resort', price: 100000000, income: 90000000 }
];

const BUSINESSES = [
    { id: 'biz1', name: 'Tech Startup', price: 2000000, income: 1500000 },
    { id: 'biz2', name: 'Restaurant Chain', price: 5000000, income: 3500000 },
    { id: 'biz3', name: 'Car Dealership', price: 10000000, income: 7500000 },
    { id: 'biz4', name: 'Private Jet Company', price: 30000000, income: 25000000 },
    { id: 'biz5', name: 'Pharmaceutical Lab', price: 75000000, income: 65000000 }
];

let state = {
    currentPlayer: null,
    currentView: 'profile-select',
    currentTab: 'dashboard',
    marketTab: 'portfolio',
    scannerActive: false
};

let globalData = {
    players: {
        'CAY': { balance: STARTING_BALANCE, pin: null, pinSet: false, monopolyBalance: 0 },
        'BROOK': { balance: STARTING_BALANCE, pin: null, pinSet: false, monopolyBalance: 0 },
        'YONNY': { balance: STARTING_BALANCE, pin: null, pinSet: false, monopolyBalance: 0 },
        'DRLEEROY': { balance: STARTING_BALANCE, pin: null, pinSet: false, monopolyBalance: 0 },
        'BANK': { balance: 999999999999, pin: null, pinSet: false, isBank: true },
        'CASINO': { balance: 999999999999, pin: null, pinSet: false, isBank: true }
    },
    transactions: [],
    monopolyTransactions: [],
    notifications: [],
    stocks: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
    bets: [],
    properties: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
    businesses: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
    loans: [],
    monopoly: {
        properties: {},
        positions: { 'CAY': 0, 'BROOK': 0, 'YONNY': 0, 'DRLEEROY': 0 },
        gameActive: false
    }
};

function initData() {
    // Ensure all data structures exist
    if (!globalData.stocks) {
        globalData.stocks = { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] };
    }
    if (!globalData.properties) {
        globalData.properties = { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] };
    }
    if (!globalData.businesses) {
        globalData.businesses = { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] };
    }
    if (!globalData.transactions) {
        globalData.transactions = [];
    }
    if (!globalData.monopolyTransactions) {
        globalData.monopolyTransactions = [];
    }
    if (!globalData.notifications) {
        globalData.notifications = [];
    }
    if (!globalData.bets) {
        globalData.bets = [];
    }
    if (!globalData.loans) {
        globalData.loans = [];
    }
    if (!globalData.monopoly) {
        globalData.monopoly = {
            properties: {},
            positions: { 'CAY': 0, 'BROOK': 0, 'YONNY': 0, 'DRLEEROY': 0 },
            gameActive: false
        };
    }
    return globalData;
}

function saveData(data) {
    globalData = data;
    dataRef.set(data).then(() => {
        console.log('✓ Data saved to Firebase');
    }).catch((error) => {
        console.error('Error saving to Firebase:', error);
        alert('Error saving data: ' + error.message);
    });
}

function formatMoney(amount) {
    if (amount === undefined || amount === null || isNaN(amount)) {
        return '$0.00';
    }
    return '$' + parseFloat(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function createBuildings() {
    const skyline = document.getElementById('skyline');
    if (!skyline) return;
    skyline.innerHTML = '';
    
    for (let i = 0; i < 60; i++) {
        const building = document.createElement('div');
        building.className = 'building';
        const height = Math.random() * 180 + 80;
        const width = Math.random() * 70 + 30;
        building.style.width = width + 'px';
        building.style.height = height + 'px';
        
        const windowRows = Math.floor(height / 25);
        const windowCols = Math.floor(width / 18);
        
        for (let row = 0; row < windowRows; row++) {
            for (let col = 0; col < windowCols; col++) {
                if (Math.random() > 0.4) {
                    const window = document.createElement('div');
                    window.className = 'window';
                    window.style.width = '10px';
                    window.style.height = '12px';
                    window.style.left = (col * 18 + 4) + 'px';
                    window.style.top = (row * 25 + 6) + 'px';
                    window.style.animationDelay = Math.random() * 4 + 's';
                    building.appendChild(window);
                }
            }
        }
        
        skyline.appendChild(building);
    }
}


function verifyPIN(player, pin, callback) {
    const data = initData();
    
    if (!data.players[player].pinSet) {
        if (pin.length === 4) {
            data.players[player].pin = pin;
            data.players[player].pinSet = true;
            saveData(data);
            callback(true);
        }
        return;
    }
    
    if (data.players[player].pin === pin) {
        callback(true);
    } else {
        const el = document.querySelector('.glass-card');
        if (el) {
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 500);
        }
        alert('Wrong PIN!');
        callback(false);
    }
}

function sendMoney(from, to, amount, pin) {
    verifyPIN(from, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const amt = parseFloat(amount);
        
        if (amt <= 0 || amt > data.players[from].balance) {
            alert('Invalid amount!');
            return;
        }
        
        data.players[from].balance -= amt;
        data.players[to].balance += amt;
        
        if (!data.transactions) data.transactions = [];
        data.transactions.push({
            from,
            to,
            amount: amt,
            timestamp: Date.now(),
            type: 'transfer'
        });
        
        // Send notification for large transfers (over $1M)
        if (amt >= 1000000) {
            sendNotificationToAll({
                title: '💰 Large Transfer Alert!',
                message: `${from} sent ${formatMoney(amt)} to ${to}!`,
                type: 'info',
                timestamp: Date.now()
            });
        }
        
        saveData(data);
        alert(`✓ Sent ${formatMoney(amt)} to ${to}`);
        
        // Force refresh after save
        setTimeout(() => {
            state.currentView = 'dashboard';
            render();
        }, 500);
    });
}

function renderProfileSelect() {
    return `
        <div class="min-h-screen flex flex-col items-center justify-center p-6">
            <div class="glass-card p-10 max-w-2xl w-full fade-in">
                <h1 class="text-5xl font-bold text-center mb-3 bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
                    THE SYNDICATE
                </h1>
                <p class="text-center text-gray-400 mb-8 text-lg">Select Your Profile</p>
                <div class="grid grid-cols-2 gap-6">
                    ${PLAYERS.map(player => `
                        <button onclick="selectPlayer('${player}')" 
                            class="profile-card p-8 rounded-3xl">
                            <div class="text-6xl mb-4 text-center pulse">${getAvatar(player)}</div>
                            <div class="text-2xl font-bold text-center text-yellow-400">${player}</div>
                        </button>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

function getAvatar(player) {
    const avatars = {
        'CAY': '🎮',
        'BROOK': '🎸',
        'YONNY': '⚡',
        'DRLEEROY': '🩺'
    };
    return avatars[player] || '👤';
}

function renderPINEntry() {
    const data = initData();
    const isFirstTime = !data.players[state.currentPlayer].pinSet;
    
    return `
        <div class="min-h-screen flex flex-col items-center justify-center p-6">
            <div class="glass-card p-10 max-w-md w-full fade-in">
                <div class="text-center mb-8">
                    <div class="text-7xl mb-4">${getAvatar(state.currentPlayer)}</div>
                    <h2 class="text-3xl font-bold text-yellow-400 mb-2">${state.currentPlayer}</h2>
                    <p class="text-gray-400">${isFirstTime ? 'Create Your 4-Digit PIN' : 'Enter Your PIN'}</p>
                </div>
                <input type="password" id="pin-input" maxlength="4" 
                    class="w-full bg-slate-900 border-2 border-yellow-500 rounded-2xl p-6 text-center text-4xl tracking-widest mb-6 text-yellow-400"
                    placeholder="••••" inputmode="numeric">
                <button onclick="submitPIN()" class="gold-btn w-full py-5 rounded-2xl text-xl mb-4">
                    ${isFirstTime ? '🔒 Create PIN' : '🔓 Enter'}
                </button>
                <button onclick="state.currentPlayer = null; render();" 
                    class="w-full text-gray-400 py-3 rounded-xl bg-slate-800/50">
                    ← Back
                </button>
            </div>
        </div>
    `;
}

function renderDashboard() {
    const data = initData();
    const player = state.currentPlayer;
    const balance = data.players[player].balance || 0;
    
    // Get all players sorted by balance
    const leaderboard = PLAYERS.map(p => ({
        name: p,
        balance: data.players[p] ? (data.players[p].balance || 0) : 0,
        avatar: getAvatar(p)
    })).sort((a, b) => b.balance - a.balance);
    
    return `
        <div class="min-h-screen pb-32 p-6">
            <div class="max-w-4xl mx-auto">
                <div class="glass-card p-8 mb-6 fade-in">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <div class="text-7xl">${getAvatar(player)}</div>
                            <div>
                                <h2 class="text-3xl font-bold text-yellow-400">${player}</h2>
                                <p class="text-gray-400">The Syndicate Member</p>
                            </div>
                        </div>
                        <button onclick="logout()" class="text-gray-400 hover:text-red-400 text-2xl">
                            🚪
                        </button>
                    </div>
                    
                    <div class="text-center py-8 bg-gradient-to-br from-yellow-900/20 to-orange-900/20 rounded-2xl border border-yellow-500/30">
                        <p class="text-gray-400 text-sm mb-2">💰 Your Balance</p>
                        <h2 class="text-5xl font-bold text-yellow-400 mb-2" style="word-break: break-word; overflow-wrap: break-word; max-width: 100%; padding: 0 0.5rem;">${formatMoney(balance)}</h2>
                        <p class="text-gray-500 text-sm">Net Worth</p>
                        <p class="text-xs text-green-400 mt-2">🔄 Live Sync Active</p>
                    </div>
                </div>
                
                <div class="glass-card p-8 mb-6 fade-in">
                    <h3 class="text-2xl font-bold text-yellow-400 mb-6">🏆 Leaderboard</h3>
                    ${leaderboard.map((p, index) => `
                        <div class="glass-card p-4 mb-3 ${p.name === player ? 'border-yellow-400 border-2' : ''}">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="text-3xl font-bold ${index === 0 ? 'text-yellow-400' : index === 1 ? 'text-gray-300' : index === 2 ? 'text-orange-600' : 'text-gray-500'}">
                                        ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}
                                    </div>
                                    <div class="text-4xl">${p.avatar}</div>
                                    <div>
                                        <p class="text-xl font-bold ${p.name === player ? 'text-yellow-400' : 'text-white'}">${p.name}</p>
                                        <p class="text-sm text-gray-400">${p.name === player ? '(You)' : ''}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-2xl font-bold text-green-400">${formatMoney(p.balance)}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="glass-card p-8 mb-6 fade-in">
                    <h3 class="text-2xl font-bold text-yellow-400 mb-6">⚡ Quick Send</h3>
                    <div class="grid grid-cols-3 gap-4">
                        ${PLAYERS.filter(p => p !== player).map(p => `
                            <button onclick="showQuickSend('${p}')"

let scanner = null;

function startQRScanner() {
    state.scannerActive = true;
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6">
            <div class="glass-card p-8 max-w-md w-full fade-in">
                <h2 class="text-3xl font-bold text-yellow-400 text-center mb-6">📷 Scan QR Code</h2>
                <p class="text-center text-gray-400 mb-4">Point your camera at another player's QR code to send them money</p>
                <div id="qr-reader" class="mb-6 rounded-xl overflow-hidden border-4 border-yellow-500"></div>
                <button onclick="stopQRScanner()" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl text-xl font-bold transition-all">
                    ❌ Cancel
                </button>
            </div>
        </div>
    `;
    
    scanner = new Html5Qrcode("qr-reader");
    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            if (decodedText.startsWith('SYNDICATE:')) {
                const recipient = decodedText.replace('SYNDICATE:', '');
                if (PLAYERS.includes(recipient)) {
                    stopQRScanner();
                    showQuickSend(recipient);
                }
            }
        }
    ).catch(err => {
        console.error('Scanner error:', err);
        alert('Camera access denied or not available. Please allow camera access in your browser settings.');
        stopQRScanner();
    });
}

function stopQRScanner() {
    if (scanner) {
        scanner.stop().then(() => {
            scanner.clear();
            scanner = null;
            state.scannerActive = false;
            state.currentView = 'exchange';
            render();
        }).catch(() => {
            scanner = null;
            state.scannerActive = false;
            state.currentView = 'exchange';
            render();
        });
    } else {
        state.scannerActive = false;
        state.currentView = 'exchange';
        render();
    }
}

async function fetchStockPrice(symbol) {
    try {
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`);
        const json = await response.json();
        return json.chart.result[0].meta.regularMarketPrice;
    } catch (error) {
        return null;
    }
}

async function fetchLiveGames() {
    try {
        const nflRes = await fetch('https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard');
        const nflData = await nflRes.json();
        const nbaRes = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard');
        const nbaData = await nbaRes.json();
        
        return {
            nfl: nflData.events.filter(e => e.status.type.state === 'in' || e.status.type.state === 'pre').slice(0, 10),
            nba: nbaData.events.filter(e => e.status.type.state === 'in' || e.status.type.state === 'pre').slice(0, 10)
        };
    } catch (error) {
        return { nfl: [], nba: [] };
    }
}

function buyStock(player, symbol, shares, pin) {
    verifyPIN(player, pin, async (success) => {
        if (!success) return;
        
        const price = await fetchStockPrice(symbol);
        if (!price) {
            alert('Failed to fetch stock price!');
            return;
        }
        
        const cost = price * shares;
        const data = initData();
        
        if (cost > data.players[player].balance) {
            alert('Insufficient funds!');
            return;
        }
        
        data.players[player].balance -= cost;
        data.stocks[player].push({
            symbol,
            shares,
            purchasePrice: price,
            timestamp: Date.now()
        });
        
        data.transactions.push({
            from: player,
            to: 'MARKET',
            amount: cost,
            timestamp: Date.now(),
            type: 'stock',
            details: `${shares} shares of ${symbol}`
        });
        
        saveData(data);
        alert(`✓ Bought ${shares} shares of ${symbol}!`);
        render();
    });
}

function buyProperty(player, propertyId, pin) {
    verifyPIN(player, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const property = PROPERTIES.find(p => p.id === propertyId);
        
        if (data.players[player].balance < property.price) {
            alert('Insufficient funds!');
            return;
        }
        
        const alreadyOwned = PLAYERS.some(p => 
            data.properties[p] && data.properties[p].some(prop => prop.id === propertyId)
        );
        
        if (alreadyOwned) {
            alert('Property already owned!');
            return;
        }
        
        data.players[player].balance -= property.price;
        data.properties[player].push({...property, purchaseDate: Date.now()});
        
        data.transactions.push({
            from: player,
            to: 'REAL ESTATE',
            amount: property.price,
            timestamp: Date.now(),
            type: 'property',
            details: property.name
        });
        
        saveData(data);
        alert(`✓ Purchased ${property.name}!`);
        render();
    });
}

function requestLoan(lender, borrower, amount, pin) {
    verifyPIN(lender, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const amt = parseFloat(amount);
        
        if (amt <= 0) {
            alert('Invalid loan amount!');
            return;
        }
        
        if (!data.loans) data.loans = [];
        
        data.loans.push({
            lender,
            borrower,
            amount: amt,
            timestamp: Date.now(),
            status: 'pending'
        });
        
        saveData(data);
        alert(`✓ Loan request sent to ${borrower}`);
        render();
    });
}

function approveLoan(loanIndex, pin) {
    const data = initData();
    const loan = data.loans[loanIndex];
    
    verifyPIN(loan.borrower, pin, (success) => {
        if (!success) return;
        
        if (data.players[loan.lender].balance < loan.amount) {
            alert('Lender has insufficient funds!');
            return;
        }
        
        data.players[loan.lender].balance -= loan.amount;
        data.players[loan.borrower].balance += loan.amount;
        data.loans[loanIndex].status = 'active';
        
        data.transactions.push({
            from: loan.lender,
            to: loan.borrower,
            amount: loan.amount,
            timestamp: Date.now(),
            type: 'loan'
        });
        
        saveData(data);
        alert('✓ Loan approved!');
        render();
    });
}

function repayLoan(loanIndex, pin) {
    const data = initData();
    const loan = data.loans[loanIndex];
    
    verifyPIN(loan.borrower, pin, (success) => {
        if (!success) return;
        
        if (data.players[loan.borrower].balance < loan.amount) {
            alert('Insufficient funds!');
            return;
        }
        
        data.players[loan.borrower].balance -= loan.amount;
        data.players[loan.lender].balance += loan.amount;
        data.loans[loanIndex].status = 'repaid';
        
        data.transactions.push({
            from: loan.borrower,
            to: loan.lender,
            amount: loan.amount,
            timestamp: Date.now(),
            type: 'loan_repay'
        });
        
        saveData(data);
        alert('✓ Loan repaid!');
        render();
    });
}

function rollDice() {
    const dice1 = Math.floor(Math.random() * 6) + 1;
    const dice2 = Math.floor(Math.random() * 6) + 1;
    return { dice1, dice2, total: dice1 + dice2 };
}

function buyMonopolyProperty(player, propertyId, pin) {
    verifyPIN(player, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const property = MONOPOLY_PROPERTIES.find(p => p.id === propertyId);
        
        if (data.players[player].balance < property.price) {
            alert('Insufficient funds!');
            return;
        }
        
        if (data.monopoly.properties[propertyId]) {
            alert('Property already owned!');
            return;
        }
        
        data.players[player].balance -= property.price;
        data.monopoly.properties[propertyId] = {
            owner: player,
            houses: 0,
            ...property
        };
        
        data.transactions.push({
            from: player,
            to: 'MONOPOLY',
            amount: property.price,
            timestamp: Date.now(),
            type: 'monopoly',
            details: `Bought ${property.name}`
        });
        
        saveData(data);
        alert(`✓ Purchased ${property.name}!`);
        render();
    });
}

function payRent(player, propertyId, pin) {
    verifyPIN(player, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const property = data.monopoly.properties[propertyId];
        const rentAmount = property.rent[property.houses];
        
        if (data.players[player].balance < rentAmount) {
            alert('Insufficient funds to pay rent!');
            return;
        }
        
        data.players[player].balance -= rentAmount;
        data.players[property.owner].balance += rentAmount;
        
        data.transactions.push({
            from: player,
            to: property.owner,
            amount: rentAmount,
            timestamp: Date.now(),
            type: 'rent',
            details: `Rent for ${property.name}`
        });
        
        saveData(data);
        alert(`✓ Paid ${formatMoney(rentAmount)} rent to ${property.owner}`);
        render();
    });
}

function monopolyRoll(player, pin) {
    verifyPIN(player, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const roll = rollDice();
        const currentPos = data.monopoly.positions[player];
        const newPos = (currentPos + roll.total) % 40;
        
        data.monopoly.positions[player] = newPos;
        saveData(data);
        
        alert(`🎲 Rolled ${roll.dice1} + ${roll.dice2} = ${roll.total}\nMoved to position ${newPos}`);
        render();
    });
}

function executeMonopolyPayment() {
    const recipient = document.getElementById('monopoly-recipient').value;
    const amount = parseFloat(document.getElementById('monopoly-amount').value);
    const reason = document.getElementById('monopoly-reason').value || 'Monopoly payment';
    const pin = document.getElementById('monopoly-pin').value;
    
    if (!amount || amount <= 0) {
        alert('Enter a valid amount!');
        return;
    }
    
    if (!pin || pin.length !== 4) {
        alert('Enter your 4-digit PIN!');
        return;
    }
    
    verifyPIN(state.currentPlayer, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        
        // Ensure monopolyBalance exists
        if (!data.players[state.currentPlayer].monopolyBalance) {
            data.players[state.currentPlayer].monopolyBalance = 0;
        }
        if (!data.players[recipient].monopolyBalance) {
            data.players[recipient].monopolyBalance = 0;
        }
        
        if (amount > data.players[state.currentPlayer].monopolyBalance) {
            alert('Insufficient Monopoly funds! You have: $' + data.players[state.currentPlayer].monopolyBalance);
            return;
        }
        
        data.players[state.currentPlayer].monopolyBalance -= amount;
        data.players[recipient].monopolyBalance += amount;
        
        if (!data.monopolyTransactions) data.monopolyTransactions = [];
        data.monopolyTransactions.push({
            from: state.currentPlayer,
            to: recipient,
            amount: amount,
            timestamp: Date.now(),
            details: reason
        });
        
        saveData(data);
        alert(`✓ Paid $${amount} Monopoly money to ${recipient}`);
        
        setTimeout(() => {
            state.currentView = 'monopoly';
            render();
        }, 500);
    });
}

function playCasinoGame(game, betAmount, pin) {
    verifyPIN(state.currentPlayer, pin, (success) => {
        if (!success) return;
        
        const data = initData();
        const player = state.currentPlayer;
        
        if (betAmount > data.players[player].balance) {
            alert('Insufficient funds!');
            return;
        }
        
        // Ensure casino exists
        if (!data.players['CASINO']) {
            data.players['CASINO'] = { balance: 999999999999, pin: null, pinSet: false, isBank: true };
        }
        
        let result = '';
        let won = false;
        let winAmount = 0;
        
        // Casino games with normal odds
        
        if (game === 'slots') {
            const symbols = ['🍒', '🍋', '🍊', '🍇', '💎', '7️⃣'];
            const reel1 = symbols[Math.floor(Math.random() * symbols.length)];
            const reel2 = symbols[Math.floor(Math.random() * symbols.length)];
            const reel3 = symbols[Math.floor(Math.random() * symbols.length)];
            
            if (reel1 === reel2 && reel2 === reel3) {
                if (reel1 === '7️⃣') {
                    winAmount = betAmount * 10;
                    result = `${reel1} ${reel2} ${reel3}\n🎰 JACKPOT! Won $${winAmount}!`;
                } else if (reel1 === '💎') {
                    winAmount = betAmount * 5;
                    result = `${reel1} ${reel2} ${reel3}\n💎 Triple Diamonds! Won $${winAmount}!`;
                } else {
                    winAmount = betAmount * 3;
                    result = `${reel1} ${reel2} ${reel3}\n✨ Triple Match! Won $${winAmount}!`;
                }
                won = true;
            } else if (reel1 === reel2 || reel2 === reel3) {
                winAmount = betAmount * 1.5;
                result = `${reel1} ${reel2} ${reel3}\n🎯 Double Match! Won $${winAmount}!`;
                won = true;
            } else {
                result = `${reel1} ${reel2} ${reel3}\n😢 No match. Lost $${betAmount}`;
            }
        } else if (game === 'roulette') {
            const number = Math.floor(Math.random() * 37);
            const color = number === 0 ? 'green' : (number % 2 === 0 ? 'black' : 'red');
            const choice = prompt('Choose: red, black, or a number (0-36)');
            
            if (choice === color || parseInt(choice) === number) {
                if (parseInt(choice) === number) {
                    winAmount = betAmount * 35;
                    result = `🎯 Number ${number} (${color})!\nExact number! Won $${winAmount}!`;
                } else {
                    winAmount = betAmount * 2;
                    result = `🎯 Number ${number} (${color})!\nColor match! Won $${winAmount}!`;
                }
                won = true;
            } else {
                result = `Number ${number} (${color})\n😢 Lost $${betAmount}`;
            }
        } else if (game === 'dice') {
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            
            if (total === 7 || total === 11) {
                winAmount = betAmount * 2;
                result = `🎲 Rolled ${dice1} + ${dice2} = ${total}\n🎉 Winner! Won $${winAmount}!`;
                won = true;
            } else if (total === 2 || total === 3 || total === 12) {
                result = `🎲 Rolled ${dice1} + ${dice2} = ${total}\n😢 Craps! Lost $${betAmount}`;
            } else {
                const point = total;
                result = `🎲 Rolled ${dice1} + ${dice2} = ${total}\n🎯 Point is ${point}. Push (bet returned)`;
                winAmount = betAmount;
                won = true;
            }
        } else if (game === 'coinflip') {
            const flip = Math.random() < 0.5 ? 'heads' : 'tails';
            const choice = prompt('Choose: heads or tails');
            
            if (choice === flip) {
                winAmount = betAmount * 2;
                result = `🪙 ${flip.toUpperCase()}!\n🎉 You win! Won $${winAmount}!`;
                won = true;
            } else {
                result = `🪙 ${flip.toUpperCase()}!\n😢 Lost $${betAmount}`;
            }
        }
        
        // Process transaction
        if (won) {
            data.players['CASINO'].balance -= winAmount;
            data.players[player].balance += winAmount;
            
            data.transactions.push({
                from: 'CASINO',
                to: player,
                amount: winAmount,
                timestamp: Date.now(),
                type: 'casino',
                details: `Won ${game}: ${result.split('\n')[0]}`
            });
        } else {
            data.players[player].balance -= betAmount;
            data.players['CASINO'].balance += betAmount;
            
            data.transactions.push({
                from: player,
                to: 'CASINO',
                amount: betAmount,
                timestamp: Date.now(),
                type: 'casino',
                details: `Lost ${game}: ${result.split('\n')[0]}`
            });
        }
        
        saveData(data);
        alert(result);
        render();
    });
}

    } else if (state.currentView === 'loans') {
        app.innerHTML = renderLoans();
    } else if (state.currentView === 'history') {
        app.innerHTML = renderHistory();
    }
}

window.onload = () => {
    // Initialize Firebase and wait for data
    dataRef.once('value').then((snapshot) => {
        let data = snapshot.val();
        if (!data) {
            data = {
                players: {
                    'CAY': { balance: STARTING_BALANCE, pin: null, pinSet: false },
                    'BROOK': { balance: STARTING_BALANCE, pin: null, pinSet: false },
                    'YONNY': { balance: STARTING_BALANCE, pin: null, pinSet: false },
                    'DRLEEROY': { balance: STARTING_BALANCE, pin: null, pinSet: false },
                    'BANK': { balance: 999999999999, pin: null, pinSet: false, isBank: true },
                    'CASINO': { balance: 999999999999, pin: null, pinSet: false, isBank: true }
                },
                transactions: [],
                stocks: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
                bets: [],
                properties: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
                businesses: { 'CAY': [], 'BROOK': [], 'YONNY': [], 'DRLEEROY': [] },
                loans: [],
                monopoly: {
                    properties: {},
                    positions: { 'CAY': 0, 'BROOK': 0, 'YONNY': 0, 'DRLEEROY': 0 },
                    gameActive: false
                }
            };
            dataRef.set(data);
        }
        
        // Ensure BANK and CASINO exist in existing data
        if (!data.players['BANK']) {
            data.players['BANK'] = { balance: 999999999999, pin: null, pinSet: false, isBank: true };
            dataRef.set(data);
        }
        if (!data.players['CASINO']) {
            data.players['CASINO'] = { balance: 999999999999, pin: null, pinSet: false, isBank: true };
            dataRef.set(data);
        }
        
        globalData = data;
        
        // Start listening for updates
        dataRef.on('value', (snapshot) => {
            const newData = snapshot.val();
            if (newData) {
                globalData = newData;
                console.log('Data updated from Firebase:', globalData);
                if (state.currentPlayer && state.currentView !== 'profile-select' && state.currentView !== 'pin-entry') {
                    render();
                }
            }
        });
        
        createBuildings();
        render();
    });
};
</script>
</body>
</html>
